<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Onside app icon — full-bleed tangerine, centered soccer ball.
       iOS masks the corners, so the background is a flat square. -->
  <rect width="1024" height="1024" fill="#C2410C"/>
  <g transform="translate(512,512)">
    <circle r="262" fill="#FAF7F2"/>
    <polygon points="0,-150 142.7,-46.4 88.2,121.4 -88.2,121.4 -142.7,-46.4" fill="#1A1D2B"/>
    <g stroke="#1A1D2B" stroke-width="16" stroke-linecap="round">
      <line x1="0" y1="-150" x2="0" y2="-248"/>
      <line x1="142.7" y1="-46.4" x2="235.9" y2="-76.6"/>
      <line x1="88.2" y1="121.4" x2="145.8" y2="200.6"/>
      <line x1="-88.2" y1="121.4" x2="-145.8" y2="200.6"/>
      <line x1="-142.7" y1="-46.4" x2="-235.9" y2="-76.6"/>
    </g>
  </g>
</svg>
