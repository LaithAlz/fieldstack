<!--
  Onside app icon.
  1024×1024 brand-green tile + bold white "O" monogram.
  Designed per the favicon-gen skill rules: 3-5 shapes max, high
  contrast, brand color, solid bg for iOS. Reads cleanly at 60px.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <!-- Background tile -->
  <rect width="1024" height="1024" fill="#15803D"/>

  <!-- "O" monogram. Built from two circles (outer white, inner brand
       green) instead of a stroked circle so the ring weight stays
       crisp at every render size. Slightly off-center horizontally for
       optical balance (the rounded form's visual center sits a touch
       right of geometric center). -->
  <circle cx="512" cy="512" r="320" fill="#FFFFFF"/>
  <circle cx="512" cy="512" r="200" fill="#15803D"/>
</svg>
