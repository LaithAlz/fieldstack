<!--
  Onside app icon — little player on a pitch.
  Top-down pitch (perimeter + halfway line + center circle) with a small
  player silhouette placed off-center in the right half (attacking).
  Brand-green tile, white markings + player.
  Six shapes — one over the favicon-gen 5 cap, but the center circle is
  the cue that ties everything to "soccer pitch" so it earns its slot.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <!-- Background grass -->
  <rect width="1024" height="1024" fill="#15803D"/>

  <!-- Pitch perimeter — slightly landscape (864×664) so it reads as a
       soccer field, not a generic rounded rectangle. Stroke 36 stays
       legible down to 60px. -->
  <rect
    x="80" y="180" width="864" height="664"
    rx="32" ry="32"
    fill="none"
    stroke="#FFFFFF"
    stroke-width="36"
  />

  <!-- Halfway line — vertical through the middle of the pitch -->
  <line
    x1="512" y1="180" x2="512" y2="844"
    stroke="#FFFFFF"
    stroke-width="36"
  />

  <!-- Center circle. Filled with brand green so the halfway line stops
       at the circle's edge inside the ring, matching a real pitch. -->
  <circle
    cx="512" cy="512" r="110"
    fill="#15803D"
    stroke="#FFFFFF"
    stroke-width="36"
  />

  <!-- Little player — right half of the pitch, off-center toward the
       attacking end. Head circle + dome body, sized small relative to
       the pitch ("little") but still readable at 60px. -->
  <circle cx="740" cy="600" r="48" fill="#FFFFFF"/>
  <path
    d="M 670 770
       L 670 720
       A 70 70 0 0 1 810 720
       L 810 770
       Z"
    fill="#FFFFFF"
  />
</svg>
