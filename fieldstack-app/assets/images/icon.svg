<!--
  Onside app icon — proper pitch diagram + kicking-pose player.
  Top-down field with perimeter, halfway line, center circle, both
  penalty boxes, both goal areas, both penalty spots, both penalty
  arcs ("D"), goals on each side. Player rendered as a thick-stroke
  stick figure in mid-kick (anatomical silhouette would need a
  multi-point traced path; this is the cleanest approximation in
  raw SVG that survives icon-size shrink).

  Many shapes — the user asked for the detail. Trade-off acknowledged:
  finer markings (corner arcs, ultra-thin lines) deliberately omitted
  so the player + ball stay legible at 60px home-screen size.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <!-- Grass -->
  <rect width="1024" height="1024" fill="#15803D"/>

  <!-- Pitch perimeter — landscape, real-soccer aspect (~1.54:1) -->
  <rect
    x="80" y="232" width="864" height="560"
    fill="none"
    stroke="#FFFFFF"
    stroke-width="18"
  />

  <!-- Halfway line -->
  <line x1="512" y1="232" x2="512" y2="792" stroke="#FFFFFF" stroke-width="18"/>

  <!-- Center circle (filled green so the halfway line visually stops
       at the ring inside, matching real pitch markings) -->
  <circle cx="512" cy="512" r="80" fill="#15803D" stroke="#FFFFFF" stroke-width="18"/>

  <!-- Center spot -->
  <circle cx="512" cy="512" r="8" fill="#FFFFFF"/>

  <!-- LEFT penalty box (big box, 130×300 from goal line) -->
  <rect
    x="80" y="362" width="130" height="300"
    fill="none"
    stroke="#FFFFFF"
    stroke-width="18"
  />

  <!-- LEFT goal area (small box, 45×140) -->
  <rect
    x="80" y="442" width="45" height="140"
    fill="none"
    stroke="#FFFFFF"
    stroke-width="18"
  />

  <!-- LEFT penalty spot -->
  <circle cx="175" cy="512" r="8" fill="#FFFFFF"/>

  <!-- LEFT penalty arc (the "D" — arc that bulges out of the penalty box) -->
  <path
    d="M 210 440 A 80 80 0 0 1 210 584"
    fill="none"
    stroke="#FFFFFF"
    stroke-width="18"
  />

  <!-- LEFT goal — small rect sticking out beyond the goal line -->
  <rect x="44" y="480" width="36" height="64" rx="4" ry="4" fill="#FFFFFF"/>

  <!-- RIGHT penalty box (mirror of left) -->
  <rect
    x="814" y="362" width="130" height="300"
    fill="none"
    stroke="#FFFFFF"
    stroke-width="18"
  />

  <!-- RIGHT goal area -->
  <rect
    x="899" y="442" width="45" height="140"
    fill="none"
    stroke="#FFFFFF"
    stroke-width="18"
  />

  <!-- RIGHT penalty spot -->
  <circle cx="849" cy="512" r="8" fill="#FFFFFF"/>

  <!-- RIGHT penalty arc -->
  <path
    d="M 814 440 A 80 80 0 0 0 814 584"
    fill="none"
    stroke="#FFFFFF"
    stroke-width="18"
  />

  <!-- RIGHT goal -->
  <rect x="944" y="480" width="36" height="64" rx="4" ry="4" fill="#FFFFFF"/>

  <!-- ============================================================
       PLAYER — kicking pose, facing right, in the lower-left area
       of the pitch. Thick stick-figure strokes with round line caps
       so each limb reads as a solid filled element at icon size.
       ============================================================ -->

  <!-- Back leg (planted) -->
  <line x1="290" y1="600" x2="265" y2="720" stroke="#FFFFFF" stroke-width="30" stroke-linecap="round"/>

  <!-- Front leg (extended forward, mid-kick toward the ball) -->
  <line x1="290" y1="600" x2="410" y2="660" stroke="#FFFFFF" stroke-width="30" stroke-linecap="round"/>

  <!-- Torso (slight forward lean) -->
  <line x1="290" y1="600" x2="305" y2="510" stroke="#FFFFFF" stroke-width="30" stroke-linecap="round"/>

  <!-- Back arm (extended back for balance) -->
  <line x1="305" y1="510" x2="240" y2="530" stroke="#FFFFFF" stroke-width="26" stroke-linecap="round"/>

  <!-- Front arm (extended forward) -->
  <line x1="305" y1="510" x2="365" y2="490" stroke="#FFFFFF" stroke-width="26" stroke-linecap="round"/>

  <!-- Head -->
  <circle cx="305" cy="475" r="32" fill="#FFFFFF"/>

  <!-- Soccer ball — at the kicking foot, about to be struck -->
  <circle cx="455" cy="680" r="36" fill="#FFFFFF"/>
</svg>
