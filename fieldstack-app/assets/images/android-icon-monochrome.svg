<!--
  Android 13+ themed-icon monochrome layer. Same "O" silhouette, black
  on transparent — Android tints it to match the user's wallpaper.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <path
    fill-rule="evenodd"
    d="M 512 292
       a 220 220 0 1 0 0.001 0 z
       M 512 374
       a 138 138 0 1 1 -0.001 0 z"
    fill="#000000"
  />
</svg>
