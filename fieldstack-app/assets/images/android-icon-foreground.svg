<!--
  Android adaptive icon foreground layer.
  Transparent background; field outline sized to fit inside the
  ~66% safe zone (≈ 340 px padding each side at 1024×1024) so launcher
  mask shapes (circle / squircle / rounded square) never crop it.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <g transform="translate(512 512) scale(0.62) translate(-512 -512)">
    <rect
      x="140" y="160"
      width="744" height="704"
      rx="32" ry="32"
      fill="none"
      stroke="#FFFFFF"
      stroke-width="56"
    />
    <line
      x1="512" y1="160"
      x2="512" y2="864"
      stroke="#FFFFFF"
      stroke-width="56"
    />
    <circle
      cx="512" cy="512" r="130"
      fill="#15803D"
      stroke="#FFFFFF"
      stroke-width="56"
    />
    <circle cx="512" cy="512" r="20" fill="#FFFFFF"/>
  </g>
</svg>
