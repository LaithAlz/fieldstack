<!--
  Android adaptive icon foreground layer.
  Transparent background; "O" sized to fit the ~66% safe zone so
  launcher mask shapes never crop it. Inner punch-out matches the
  background tile color so the ring reads as a true "O" when stacked
  on android-icon-background.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <circle cx="512" cy="512" r="220" fill="#FFFFFF"/>
  <circle cx="512" cy="512" r="138" fill="#15803D"/>
</svg>
