<!--
  Android adaptive icon foreground layer — pitch center mark sized
  to fit the ~66% safe zone so launcher mask shapes can't crop it.
  Transparent background; brand-green will come from the background
  layer when stacked.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <g transform="translate(512 512) scale(0.62) translate(-512 -512)">
    <rect x="488" y="160" width="48" height="704" rx="24" ry="24" fill="#FFFFFF"/>
    <circle
      cx="512" cy="512" r="300"
      fill="none"
      stroke="#FFFFFF"
      stroke-width="80"
    />
  </g>
</svg>
