  <g transform="translate(512 512) scale(0.62) translate(-512 -512)">
    <rect
      x="80" y="180" width="864" height="664"
      rx="32" ry="32"
      fill="none"
      stroke="#FFFFFF"
      stroke-width="36"
    />
    <line
      x1="512" y1="180" x2="512" y2="844"
      stroke="#FFFFFF"
      stroke-width="36"
    />
    <circle
      cx="512" cy="512" r="110"
      fill="#15803D"
      stroke="#FFFFFF"
      stroke-width="36"
    />
    <circle cx="740" cy="600" r="48" fill="#FFFFFF"/>
    <path
      d="M 670 770
         L 670 720
         A 70 70 0 0 1 810 720
         L 810 770
         Z"
      fill="#FFFFFF"
    />
  </g>
</svg>
