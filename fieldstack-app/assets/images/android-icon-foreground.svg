<!--
  Android adaptive icon foreground — same player+ball mark scaled to
  the ~66% safe zone so launcher mask shapes can't crop it.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <g transform="translate(512 512) scale(0.62) translate(-512 -512)">
    <rect x="140" y="900" width="744" height="32" rx="16" ry="16" fill="#FFFFFF"/>
    <path
      d="M 240 700
         A 180 180 0 0 1 600 700
         L 600 900
         L 240 900
         Z"
      fill="#FFFFFF"
    />
    <circle cx="420" cy="390" r="120" fill="#FFFFFF"/>
    <circle cx="780" cy="830" r="100" fill="#FFFFFF"/>
  </g>
</svg>
