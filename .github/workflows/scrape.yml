name: Scrape

# Runs the existing scrape pipeline (`bun scripts/scrape/run.ts all`) on a
# schedule so venue/field data refreshes without anyone running it by hand.
#
# Gated on the SUPABASE_SERVICE_ROLE_KEY repo secret: if it isn't set (forks,
# or before the secret is configured) the job skips gracefully with a notice
# instead of failing red. Mirrors the optional-step pattern in
# migrations.yml's "Check remote for unapplied migrations" step.
#
# See docs/scraping.md §4.1 for why this is a GitHub Actions cron rather than
# a Fly cron machine for now.
on:
  # Weekly, Mondays 08:00 UTC. The scraper is idempotent (upserts on
  # external_id), so cadence is a freshness/cost tradeoff — bump as coverage
  # and source count grow.
  schedule:
    - cron: "0 8 * * 1"
  # Manual trigger from the Actions tab, for on-demand refreshes.
  workflow_dispatch:

concurrency:
  group: scrape-${{ github.ref }}
  cancel-in-progress: false

jobs:
  scrape:
    name: Run all scrape sources
    runs-on: ubuntu-latest
    # The scrape pipeline + its deps live in apps/api.
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run scrape (all sources)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          # The google source needs this too — omitting it here (while the
          # enrichment step below has it) made that source fail on every
          # scheduled run once it was registered in ADAPTERS.
          GOOGLE_PLACES_API_KEY: ${{ secrets.GOOGLE_PLACES_API_KEY }}
        run: |
          if [ -z "$SUPABASE_SERVICE_ROLE_KEY" ] || [ -z "$SUPABASE_URL" ]; then
            echo "::notice::Skipping scrape — set SUPABASE_URL and SUPABASE_SERVICE_ROLE_KEY repo secrets to enable the scheduled scraper."
            exit 0
          fi
          bun scripts/scrape/run.ts all

      # Weekly photo refresh is NOT optional freshness polish: the stored
      # googleusercontent URIs are short-lived per Google's terms, so if this
      # stops running, venue photos rot into broken images (clients then fall
      # back to the satellite hero). `always()` because the scrape step exits
      # 1 on a zero-rows guard trip or a failed source — that must not
      # suppress the photo refresh.
      - name: Enrich venue photos (Google Places)
        if: ${{ always() }}
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GOOGLE_PLACES_API_KEY: ${{ secrets.GOOGLE_PLACES_API_KEY }}
        run: |
          if [ -z "$GOOGLE_PLACES_API_KEY" ] || [ -z "$SUPABASE_SERVICE_ROLE_KEY" ]; then
            echo "::notice::Skipping photo enrichment — set GOOGLE_PLACES_API_KEY (plus Supabase secrets) to enable."
            exit 0
          fi
          bun scripts/scrape/enrichPhotos.ts

      # Cross-source dedup after every scrape: a weekly OSM/Google run can
      # re-introduce a row for a venue another source already carries. Only
      # the conservative AUTO tier applies unattended (cross-source, near-
      # identical name, co-located — see lib/dedupe.ts); REVIEW candidates
      # are printed into the job log for a human. `always()` so a scrape-step
      # failure still dedupes whatever the surviving sources upserted.
      - name: Deduplicate venues (auto tier)
        if: ${{ always() }}
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          if [ -z "$SUPABASE_SERVICE_ROLE_KEY" ] || [ -z "$SUPABASE_URL" ]; then
            echo "::notice::Skipping dedup — Supabase secrets not set."
            exit 0
          fi
          bun scripts/scrape/dedupe.ts --apply
