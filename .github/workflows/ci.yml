name: CI

on:
  pull_request:
  push:
    branches: [main]

# Cancel an in-flight CI run for a branch when a newer commit lands.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (typecheck)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Typecheck
        run: bun run typecheck
      - name: Tests
        run: bun run test

  mobile:
    name: Mobile (typecheck + lint + test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: fieldstack-app
    steps:
      - uses: actions/checkout@v4
      # npm (not bun) so CI resolves node_modules the same way EAS does. bun and
      # npm hoist differently, which previously diverged the build fingerprint
      # and dropped a hoisted dependency. package-lock.json is the source of
      # truth for both CI and EAS.
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: fieldstack-app/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Typecheck
        run: npm run typecheck
      - name: Lint
        run: npm run lint
      - name: Tests
        run: npm run test

  site:
    name: Site (build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: site/package-lock.json
      - name: Install dependencies
        working-directory: site
        run: npm ci
      # design/tokens.json is the single source of truth for both
      # fieldstack-app/src/theme/palette.ts and site/app/tokens.css — fails
      # the build if either generated file has drifted out of sync.
      - name: Check design tokens are in sync
        run: |
          node design/generate.mjs
          git diff --exit-code design fieldstack-app/src/theme/palette.ts site/app/tokens.css
      - name: Build
        working-directory: site
        # No secrets required — the site builds without SUPABASE_URL /
        # SUPABASE_ANON_KEY set (see lib/venues.ts), it just skips venue
        # pages until the env is configured in Vercel.
        run: npm run build
