# Fly.io config for the Onside Fastify API.
# Deploy: see docs/deploy-backend.md. Rename `app` if the name is taken.
app = "onside-api"
primary_region = "yyz"  # Toronto — closest to GTA users

[build]

[env]
  NODE_ENV = "production"
  HOST = "0.0.0.0"
  PORT = "3000"
  # Behind Fly's proxy — honour X-Forwarded-For so per-IP rate limiting sees
  # the real client, not the proxy.
  TRUST_PROXY = "true"

[http_service]
  internal_port = 3000
  force_https = true
  # Scale to zero when idle (cheapest). Bump min_machines_running to 1 if cold
  # starts feel slow once there's steady traffic.
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "15s"
    method = "GET"
    path = "/health"
