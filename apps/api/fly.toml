# fly.toml app configuration file generated for onside-api-wild-current-9606 on 2026-06-15T19:09:14-04:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'onside-api-wild-current-9606'
primary_region = 'yyz'

[build]

[env]
  HOST = '0.0.0.0'
  NODE_ENV = 'production'
  PORT = '3000'
  TRUST_PROXY = 'true'

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  # Keep one machine always running so the first request after idle never pays a
  # cold start (the app's API client times out at 10s; a cold start during App
  # Store review would show an empty venue list). Revert to 0 to save cost once
  # traffic is steady.
  min_machines_running = 1

  [[http_service.checks]]
    interval = '30s'
    timeout = '5s'
    grace_period = '15s'
    method = 'GET'
    path = '/health'

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
