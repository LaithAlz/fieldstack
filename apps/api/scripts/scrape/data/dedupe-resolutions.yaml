# Dedupe resolutions registry (issue #495).
#
# Human verdicts on cross-source venue dedup REVIEW pairs, so a decision made
# today doesn't evaporate the next time the weekly scrape's dedupe pass runs.
# Consumed by apps/api/scripts/scrape/dedupe.ts via lib/dedupe.ts's
# loadResolutions/applyResolutions.
#
# Each entry resolves ONE pair of venues, matched by external_id, unordered
# (a/b can appear in either order — dedupe.ts's own "keep"/"drop" printout
# order does not need to match this file).
#
# Schema:
#   a, b     (required) — the two venues' external_id, e.g. "google:ChIJ...".
#   verdict  (required) — "merge" (same physical venue) or "distinct" (two
#                          real, different bookables that should both stay).
#   keep     (required for verdict: merge; forbidden for distinct) — must
#            equal a or b. The OTHER row is the one dedupe.ts --apply
#            deactivates (is_active=false, duplicate_of=keep's id), exactly
#            like an AUTO-tier pair. This OVERRIDES lib/dedupe.ts's own
#            pickWinner() source-priority pick when the two disagree — a
#            human verdict wins.
#   reason   (required) — one line, why. Cite the host facility for a
#            "distinct: tenant club at a facility" verdict; cite the source
#            or evidence for a "merge: same facility" verdict.
#   decided  (required) — YYYY-MM-DD, when the verdict was made.
#
# What the runner does with each verdict:
#   - distinct — the pair is suppressed from REVIEW output entirely (just a
#                summary count). The tenant/club row is NOT deactivated here;
#                many of these are club/academy/league noise better handled
#                by a refine.ts pass (see the follow-up list in issue #495).
#   - merge    — applied under --apply exactly like an AUTO pair. Printed as
#                a MERGE line even in a dry run so the plan is visible.
#
# A resolution that matches NO pair in the current findDuplicates() output
# (the underlying venues changed, or the pair was never mechanically
# detected in the first place — see the Wentworth entry below) prints as a
# stale info line. Harmless; prune it once it has been stale a while, or
# leave it as institutional memory for a decision that predates detection.
#
# Adjudicated 2026-07-10 against the 59 REVIEW pairs from that day's dry run
# (issue #495). See the issue/PR for the full evidence per pair. One pair
# (Erin Mills Twin Arena Grounds vs Erin Mills Twin Arena, ~79m apart) was
# left OUT of this file deliberately — genuinely unclear whether the google
# row is an echo of the same soccer field or the (non-soccer) ice arena
# building on the same site; it still prints as an ordinary REVIEW pair.

