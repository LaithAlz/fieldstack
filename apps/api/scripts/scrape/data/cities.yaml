# Cities the OSM scraper sweeps. Each entry is an OSM admin-boundary
# relation — the scraper does an Overpass `area` query against these,
# which is how we get clean per-city scopes without bbox leakage.
#
# `lat`/`lng` are the city-centre search coordinates used by radius-based
# sources (Playtomic's `tenants` sweep) — approximate is fine, they only
# seed a search circle, not a boundary.
#
# To add a city:
#   1. Open nominatim.openstreetmap.org and search for it.
#   2. Find the result whose type is "boundary" / "administrative".
#   3. Copy the relation ID from the URL (or the OSM ID column).
#   4. Verify it's the right Ontario one (Wikidata Q-id is the safest cross-check).
#   5. Add lat/lng for the city centre (any map's coordinate lookup works).
#
# Each city's admin_level is noted because Toronto and Hamilton are
# admin_level=6 (single-tier municipalities) while the rest are 8.
# The scraper doesn't care — but you do, when looking these up.

cities:
  # Halton + Hamilton corridor (original scope)
  - name: Hamilton
    osm_relation_id: 7034910
    wikidata: Q133116
    lat: 43.2557
    lng: -79.8711
