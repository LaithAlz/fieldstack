# Operators (the businesses that run private soccer facilities).
# Each entry becomes a row in the `operators` table. The scraper
# matches scraped venues against this registry by name + aliases —
# matched venues get linked to the operator and inherit its booking
# URL when the venue itself doesn't carry one.
#
# Schema:
#   name          (required) — canonical operator name, becomes the
#                              operators.name in the DB.
#   website       — operator's main marketing site
#   booking_url   — direct link to where users actually book a slot.
#                   If absent, the website is used as a fallback.
#   integration_type — 'none' | 'playtomic' | 'courtreserve' | 'amilia'.
#                      Defaults to 'none'. Set when the operator uses a
#                      known booking platform — lets us deep-link
#                      with pre-filled date/time when we want to.
#   courtreserve_org_id — (courtreserve only) numeric OrgId from the
#                      club's CourtReserve Public Booking portal
#                      (app.courtreserve.com/Online/Portal/Index/{OrgId}).
#                      No GTA/Hamilton soccer facility has been found on
#                      CourtReserve yet, so this key ships unused —
#                      the enum path exists for when one is.
#   amilia_rewrite_url — (amilia only) the org's storefront slug from
#                      app.amilia.com/store/en/{rewriteUrl}/shop/programs.
#                      The two GTA domes with an Amilia storefront use it
#                      for youth-program signup only — their hourly
#                      rentals go through CatchCorner, so they carry a
#                      plain booking_url instead (see the Amilia comments
#                      on Markham Sports Dome / Woodbridge Sports Dome
#                      below rather than this key).
#   playtomic_slug     — (playtomic only) the club slug from
#                      playtomic.com/clubs/{slug}. Usually auto-discovered
#                      by sources/playtomic.ts; set explicitly here only
#                      to force-link a club by hand.
#   aliases       — alternate names that scraped venues might appear as.
#                   Case-insensitive substring match. Add a new alias when
#                   you see a venue that should be linked but isn't.
#   hours         (optional) published operating hours, same shape as
#                 venues.hours: keys sun, mon, tue, wed, thu, fri, sat,
#                 values "HH:MM-HH:MM" (24 hour clock) or null for a
#                 closed day. A midnight close is written "24:00", which
#                 the app's parser accepts (parseRange in
#                 fieldstack-app/src/lib/venueHours.ts allows exactly
#                 24:00, nothing later). Only add hours actually verified
#                 on the operator's own site (or a CatchCorner facility
#                 page for CatchCorner booked venues). Put a one line
#                 source comment directly above the block, e.g.
#                   # hours: https://example.com/hours, verified YYYY-MM-DD
#                 Applied by the runner only when the scraped venue's own
#                 adapter did not already supply hours, see
#                 lib/venueHours.ts; today only playtomic.ts does.
#
# Exactly one of courtreserve_org_id / amilia_rewrite_url / playtomic_slug
# should be set per operator, matching its integration_type, e.g.:
#
#   - name: Example Club
#     integration_type: courtreserve
#     courtreserve_org_id: 12345        # number
#   # or
#     integration_type: amilia
#     amilia_rewrite_url: example-club  # string
#   # or
#     integration_type: playtomic
#     playtomic_slug: example-club      # string
#
# Booking URL TODOs: many operators here have website set but
# booking_url missing or pointing at the homepage. Fill in real
# deep-links as you find them — search the operator's site for "Book
# Now" / "Reserve" buttons.

