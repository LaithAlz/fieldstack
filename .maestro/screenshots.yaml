# App Store screenshot capture. Drives the app (running in Expo Go) through
# the key marketing screens and saves a PNG per screen. Run with the app
# already loaded on the Explore tab:
#
#   cd fieldstack-app && bun run start         # Metro, with the project open in Expo Go
#   maestro test .maestro/screenshots.yaml
#
# Screenshots land as <name>.png in the directory you run from. They come out
# at the simulator's native resolution; resize to the App Store slot size
# afterward (scripts/appstore-screens.sh).
#
# Navigation avoids the iOS edge-swipe back (unreliable in Maestro): screens
# are reached via the tab bar and each screen's own labeled back button.
#
# Note: the Map screen is intentionally skipped — react-native-maps isn't in
# Expo Go, so capture that one from a dev build.

appId: host.exp.Exponent
---
# 1. Explore (the hero list)
- assertVisible: "VENUES"
- takeScreenshot: 01-explore

# 2. Me / Profile — via the tab bar, then back to Explore via the tab.
- tapOn:
    text: ".*Me, tab.*"
- waitForAnimationToEnd:
    timeout: 5000
- takeScreenshot: 04-profile
- tapOn:
    text: ".*Explore, tab.*"
- waitForAnimationToEnd

# 3. Field search — open via the Explore link, leave via its back button.
- tapOn:
    text: ".*Search fields.*"
- waitForAnimationToEnd:
    timeout: 5000
- takeScreenshot: 03-field-search
- tapOn: "Back to venues"
- waitForAnimationToEnd

# 4. Venue detail — tapped last, so no return navigation needed.
- tapOn:
    text: ".*km away.*"
    index: 0
- waitForAnimationToEnd:
    timeout: 5000
- takeScreenshot: 02-venue-detail
