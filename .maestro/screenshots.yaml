# App Store screenshot capture. Drives the app through the key marketing
# screens and saves a PNG per screen.
#
# Requires a DEV BUILD, not Expo Go: Explore is now a single map + bottom
# sheet surface backed by react-native-maps, which isn't available inside
# Expo Go. Build + install a development client (see docs/releasing.md),
# then:
#
#   cd fieldstack-app && npm start        # Metro, dev build already installed
#   maestro test .maestro/screenshots.yaml
#
# Screenshots land as <name>.png in the directory you run from. They come out
# at the simulator's native resolution; resize to the App Store slot size
# afterward (scripts/appstore-screens.sh).
#
# Navigation avoids the iOS edge-swipe back (unreliable in Maestro): screens
# are reached via the tab bar and each screen's own labeled back button.

appId: app.onside.mobile
---
# 1. Explore — map canvas + draggable sheet, "N field(s) near you" header.
- assertVisible:
    text: "[0-9]+ fields? near you"
- takeScreenshot: 01-explore

# 2. Tap the first venue card in the sheet list. Distance chip text comes
#    from live/seed data; matching on "km away" (part of the card's
#    accessibility label — see ExploreCard.tsx) keeps this seed-stable
#    instead of asserting a specific venue name.
- tapOn:
    text: ".*km away.*"
    index: 0
- waitForAnimationToEnd:
    timeout: 5000
- assertVisible: "Fields"
- takeScreenshot: 02-venue-detail

# 3. Back to Explore via the screen's own back button, then to the Me tab.
- tapOn: "Go back"
- waitForAnimationToEnd
- tapOn:
    text: ".*Me, tab.*"
- waitForAnimationToEnd:
    timeout: 5000
- assertVisible: "Preferred time"
- takeScreenshot: 03-me
